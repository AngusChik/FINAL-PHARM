<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #0f172a;
    }
    .error-card {
      text-align: center; background: #ffffff; padding: 48px 56px; border-radius: 16px;
      border: 1px solid #e2e8f0; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
    }
    .error-code { font-size: 64px; font-weight: 800; color: #ef4444; margin: 0; line-height: 1; }
    h1 { font-size: 20px; margin: 16px 0 8px; }
    p { color: #64748b; margin: 0 0 24px; }
    a {
      display: inline-block; padding: 10px 24px; background: #4f46e5; color: #ffffff;
      text-decoration: none; border-radius: 8px; font-weight: 600;
    }
    a:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="error-card">
    <p class="error-code">500</p>
    <h1>Something went wrong</h1>
    <p>An unexpected error occurred. Please try again — if it keeps happening, restart the server or contact the administrator.</p>
    <a href="/">Back to Dashboard</a>
  </div>
</body>
</html>
